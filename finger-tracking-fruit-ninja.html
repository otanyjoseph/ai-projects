<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Ninja AR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Arial Black', sans-serif;
    user-select: none;
  }
  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0;
    transition: opacity 0.5s;
  }
  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #loading {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.92);
    z-index: 10;
    transition: opacity 0.5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .status-icon {
    font-size: 64px;
    margin-bottom: 20px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }
  .status-text {
    color: #fff;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.8;
  }
  .status-sub {
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    letter-spacing: 2px;
    margin-top: 10px;
    text-transform: uppercase;
  }
  #gameover {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  #gameover.show { opacity: 1; pointer-events: all; }
  #gameover h1 {
    color: #ff3333;
    font-size: 72px;
    text-shadow: 0 0 30px rgba(255,50,50,0.8), 0 0 60px rgba(255,50,50,0.4);
    letter-spacing: 4px;
    margin-bottom: 16px;
    animation: glitch 0.3s ease-in-out infinite alternate;
  }
  @keyframes glitch {
    0% { text-shadow: 0 0 30px rgba(255,50,50,0.8), -2px 0 rgba(0,255,255,0.5); }
    100% { text-shadow: 0 0 30px rgba(255,50,50,0.8), 2px 0 rgba(255,0,255,0.5); }
  }
  #final-score {
    color: #fff;
    font-size: 32px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  #score-spacer { height: 130px; }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="loading">
    <div class="status-icon" id="status-icon">📷</div>
    <div class="status-text" id="status-text">Starting Camera</div>
    <div class="status-sub" id="status-sub">Please allow camera access</div>
  </div>

  <div id="gameover">
    <h1>GAME OVER</h1>
    <div id="final-score">Score: 0</div>
    <div id="score-spacer"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('video');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── State ───────────────────────────────────────────────────────────────────
let score = 0;
let lives = 3;
let gameActive = false;
let gameOverFlag = false;
let readyToStart = false;
let fruits = [];
let particles = [];
let halfFruits = [];
let slashTrail = [];
let lastSliceTime = 0;
let frameCount = 0;
let startCircle = null;
let restartCircle = null;

const FRUIT_COLORS = [
  { fill: '#FF4D6D', glow: '#ff0033' },
  { fill: '#FFD60A', glow: '#ffaa00' },
  { fill: '#06D6A0', glow: '#00ff99' },
  { fill: '#4CC9F0', glow: '#00ccff' },
  { fill: '#F72585', glow: '#ff0099' },
  { fill: '#FB5607', glow: '#ff6600' },
];

// ─── Action Circle (slice to start / restart) ─────────────────────────────────
class ActionCircle {
  constructor(label, color) {
    this.r = 90;
    this.x = canvas.width / 2;
    this.y = canvas.height * 0.68;
    this.color = color;
    this.label = label;
    this.sliced = false;
    this.pulse = 0;
    this.wobble = 0;
  }

  update() {
    this.pulse += 0.05;
    this.wobble = Math.sin(this.pulse) * 5;
  }

  draw() {
    if (this.sliced) return;
    const r = this.r + Math.sin(this.pulse * 1.3) * 5;
    const cy = this.y + this.wobble;

    ctx.save();
    ctx.translate(this.x, cy);

    // Pulsing outer ring
    ctx.beginPath();
    ctx.arc(0, 0, r + 10, 0, Math.PI * 2);
    ctx.strokeStyle = this.color.glow;
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.35 + Math.sin(this.pulse) * 0.2;
    ctx.shadowColor = this.color.glow;
    ctx.shadowBlur = 35;
    ctx.stroke();

    // Main fill
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = this.color.fill;
    ctx.shadowColor = this.color.glow;
    ctx.shadowBlur = 28;
    ctx.fill();

    // Shine
    try {
      const shine = ctx.createRadialGradient(-r*0.3, -r*0.3, 1, -r*0.3, -r*0.3, r*0.75);
      shine.addColorStop(0, 'rgba(255,255,255,0.42)');
      shine.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.shadowBlur = 0;
      ctx.fillStyle = shine;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
    } catch(e) {}

    // Text
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lines = this.label.split('\n');
    const lineH = 22;
    const startY = -(lines.length - 1) * lineH / 2;
    lines.forEach((line, i) => {
      ctx.font = `bold ${i === 0 ? 17 : 13}px Arial Black`;
      ctx.fillText(line, 0, startY + i * lineH);
    });

    ctx.restore();
  }

  hitTest(px, py) {
    const dx = px - this.x;
    const dy = py - (this.y + this.wobble);
    return Math.sqrt(dx*dx + dy*dy) < this.r + 12;
  }
}

// ─── Fruit ────────────────────────────────────────────────────────────────────
class Fruit {
  constructor() {
    this.r = 36 + Math.random() * 18;
    this.x = this.r + Math.random() * (canvas.width - this.r * 2);
    this.y = canvas.height + this.r;
    this.color = FRUIT_COLORS[Math.floor(Math.random() * FRUIT_COLORS.length)];
    this.sliced = false;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.08;

    // 3 speed tiers — some go near the top
    const tier = Math.random();
    let speed;
    if (tier < 0.25) speed = 19 + Math.random() * 4;      // fast — reaches top 20%
    else if (tier < 0.65) speed = 13 + Math.random() * 4; // medium
    else speed = 9 + Math.random() * 3;                    // slow — lower arc

    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.65;
    this.vx = Math.cos(angle) * speed * 0.35;
    this.vy = Math.sin(angle) * speed;
    this.gravity = 0.22;
  }

  update() {
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.rotation += this.rotSpeed;
  }

  isOffScreen() { return this.y > canvas.height + this.r + 10; }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.shadowColor = this.color.glow;
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color.fill;
    ctx.fill();
    try {
      const shine = ctx.createRadialGradient(-this.r*0.3, -this.r*0.3, 1, -this.r*0.3, -this.r*0.3, this.r*0.7);
      shine.addColorStop(0, 'rgba(255,255,255,0.45)');
      shine.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.shadowBlur = 0;
      ctx.fillStyle = shine;
      ctx.beginPath();
      ctx.arc(0, 0, this.r, 0, Math.PI * 2);
      ctx.fill();
    } catch(e) {}
    ctx.restore();
  }
}

// ─── Particle ─────────────────────────────────────────────────────────────────
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 6;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = 0.03 + Math.random() * 0.02;
    this.r = 4 + Math.random() * 8;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.15;
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.shadowColor = this.color.glow;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.max(0.1, this.r * this.life), 0, Math.PI * 2);
    ctx.fillStyle = this.color.fill;
    ctx.fill();
    ctx.restore();
  }
}

// ─── Half Fruit ───────────────────────────────────────────────────────────────
class HalfFruit {
  constructor(x, y, color, dir) {
    this.x = x; this.y = y; this.color = color;
    this.vx = dir * (3 + Math.random() * 3);
    this.vy = -4 - Math.random() * 3;
    this.gravity = 0.3;
    this.r = 38;
    this.life = 1;
    this.decay = 0.022;
    this.rotation = 0;
    this.rotSpeed = dir * 0.09;
  }
  update() {
    this.vy += this.gravity;
    this.x += this.vx; this.y += this.vy;
    this.rotation += this.rotSpeed;
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = this.life;
    ctx.shadowColor = this.color.glow;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI, false);
    ctx.fillStyle = this.color.fill;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI, false);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();
    ctx.restore();
  }
}

// ─── Trail ────────────────────────────────────────────────────────────────────
const TRAIL_LENGTH = 18;

function addTrailPoint(x, y) {
  slashTrail.push({ x, y, t: Date.now() });
  if (slashTrail.length > TRAIL_LENGTH) slashTrail.shift();
}

function drawTrail() {
  if (slashTrail.length < 2) return;
  const now = Date.now();
  for (let i = 1; i < slashTrail.length; i++) {
    const prev = slashTrail[i-1], curr = slashTrail[i];
    const age = (now - curr.t) / 120;
    const alpha = Math.max(0, 1 - age);
    const width = (i / slashTrail.length) * 14 + 2;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(curr.x, curr.y);
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.9})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.shadowColor = 'rgba(200,220,255,0.9)';
    ctx.shadowBlur = 20;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(curr.x, curr.y);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = width * 0.3;
    ctx.shadowBlur = 5;
    ctx.stroke();
    ctx.restore();
  }
}

function getTrailVelocity() {
  if (slashTrail.length < 3) return 0;
  const a = slashTrail[0], b = slashTrail[slashTrail.length - 1];
  const dx = b.x - a.x, dy = b.y - a.y;
  const dt = (b.t - a.t) / 1000 || 0.001;
  return Math.sqrt(dx*dx + dy*dy) / dt;
}

function lineCircleIntersect(x1, y1, x2, y2, cx, cy, r) {
  const dx = x2-x1, dy = y2-y1, fx = x1-cx, fy = y1-cy;
  const a = dx*dx+dy*dy, b = 2*(fx*dx+fy*dy), c = fx*fx+fy*fy-r*r;
  let disc = b*b-4*a*c;
  if (disc < 0) return false;
  disc = Math.sqrt(disc);
  const t1 = (-b-disc)/(2*a), t2 = (-b+disc)/(2*a);
  return (t1>=0&&t1<=1)||(t2>=0&&t2<=1);
}

function spawnSliceEffect(x, y, color) {
  for (let p = 0; p < 16; p++) particles.push(new Particle(x, y, color));
  halfFruits.push(new HalfFruit(x, y, color, -1));
  halfFruits.push(new HalfFruit(x, y, color, 1));
}

// ─── Slice Detection ──────────────────────────────────────────────────────────
function checkSlice() {
  const velocity = getTrailVelocity();
  if (velocity < 200) return;
  if (Date.now() - lastSliceTime < 50) return;

  // Start circle
  if (readyToStart && startCircle && !startCircle.sliced) {
    for (let j = 1; j < slashTrail.length; j++) {
      if (lineCircleIntersect(
        slashTrail[j-1].x, slashTrail[j-1].y,
        slashTrail[j].x, slashTrail[j].y,
        startCircle.x, startCircle.y + startCircle.wobble, startCircle.r
      )) {
        startCircle.sliced = true;
        lastSliceTime = Date.now();
        spawnSliceEffect(startCircle.x, startCircle.y + startCircle.wobble, startCircle.color);
        setTimeout(startGame, 500);
        return;
      }
    }
  }

  // Restart circle
  if (gameOverFlag && restartCircle && !restartCircle.sliced) {
    for (let j = 1; j < slashTrail.length; j++) {
      if (lineCircleIntersect(
        slashTrail[j-1].x, slashTrail[j-1].y,
        slashTrail[j].x, slashTrail[j].y,
        restartCircle.x, restartCircle.y + restartCircle.wobble, restartCircle.r
      )) {
        restartCircle.sliced = true;
        lastSliceTime = Date.now();
        spawnSliceEffect(restartCircle.x, restartCircle.y + restartCircle.wobble, restartCircle.color);
        setTimeout(startGame, 500);
        return;
      }
    }
  }

  // Game fruits
  if (!gameActive) return;

  for (let i = 0; i < fruits.length; i++) {
    const f = fruits[i];
    if (f.sliced) continue;
    for (let j = 1; j < slashTrail.length; j++) {
      if (lineCircleIntersect(
        slashTrail[j-1].x, slashTrail[j-1].y,
        slashTrail[j].x, slashTrail[j].y,
        f.x, f.y, f.r
      )) {
        f.sliced = true;
        score++;
        lastSliceTime = Date.now();
        spawnSliceEffect(f.x, f.y, f.color);
        break;
      }
    }
  }
  fruits = fruits.filter(f => !f.sliced);
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.save();
  ctx.font = 'bold 36px Arial Black';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(255,255,255,0.5)';
  ctx.shadowBlur = 15;
  ctx.textAlign = 'left';
  ctx.fillText(score, 28, 54);
  ctx.font = '13px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.shadowBlur = 0;
  ctx.fillText('SCORE', 28, 72);
  ctx.font = '26px Arial';
  ctx.textAlign = 'right';
  let hearts = '';
  for (let i = 0; i < 3; i++) hearts += i < lives ? '❤️' : '🖤';
  ctx.fillText(hearts, canvas.width - 24, 50);
  ctx.restore();
}

// ─── Ready Screen ─────────────────────────────────────────────────────────────
function drawReadyScreen() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.52)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';
  ctx.font = 'bold 52px Arial Black';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(255,255,255,0.5)';
  ctx.shadowBlur = 25;
  ctx.fillText('FRUIT NINJA AR', canvas.width/2, canvas.height * 0.26);

  ctx.shadowBlur = 0;
  ctx.font = '15px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('POINT YOUR INDEX FINGER  ·  SWIPE FAST TO SLICE', canvas.width/2, canvas.height * 0.34);
  ctx.restore();

  if (startCircle) { startCircle.update(); startCircle.draw(); }
}

// ─── Spawn ────────────────────────────────────────────────────────────────────
function maybeSpawn() {
  if (!gameActive) return;
  frameCount++;
  const interval = Math.max(45, 90 - Math.floor(score / 5) * 3);
  if (frameCount % interval === 0) {
    const count = Math.random() < 0.25 ? 2 : 1;
    for (let i = 0; i < count; i++) fruits.push(new Fruit());
  }
}

// ─── Game Loop ────────────────────────────────────────────────────────────────
function gameLoop() {
  try {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (readyToStart && !gameActive && !gameOverFlag) {
      drawReadyScreen();
    }

    if (gameActive) {
      maybeSpawn();
      for (let i = fruits.length - 1; i >= 0; i--) {
        fruits[i].update();
        fruits[i].draw();
        if (fruits[i].isOffScreen()) {
          fruits.splice(i, 1);
          lives--;
          if (lives <= 0) triggerGameOver();
        }
      }
      drawHUD();
    }

    if (gameOverFlag && restartCircle) {
      restartCircle.update();
      restartCircle.draw();
    }

    // Particles & halves always render (slice effects on any screen)
    for (let i = halfFruits.length - 1; i >= 0; i--) {
      halfFruits[i].update(); halfFruits[i].draw();
      if (halfFruits[i].life <= 0) halfFruits.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update(); particles[i].draw();
      if (particles[i].life <= 0) particles.splice(i, 1);
    }

    drawTrail();
    checkSlice();

  } catch(e) { console.error('gameLoop error:', e); }

  requestAnimationFrame(gameLoop);
}

// ─── Game Control ─────────────────────────────────────────────────────────────
function showReadyScreen() {
  readyToStart = true;
  gameActive = false;
  gameOverFlag = false;
  startCircle = new ActionCircle('SLICE ME\nTO START', { fill: '#06D6A0', glow: '#00ff99' });
  restartCircle = null;
}

function startGame() {
  score = 0; lives = 3;
  fruits = []; particles = []; halfFruits = [];
  slashTrail = [];
  frameCount = 0;
  lastSliceTime = 0;
  readyToStart = false;
  gameOverFlag = false;
  gameActive = true;
  startCircle = null;
  restartCircle = null;
  document.getElementById('gameover').classList.remove('show');
}

function triggerGameOver() {
  gameActive = false;
  gameOverFlag = true;
  fruits = [];
  document.getElementById('final-score').textContent = 'Score: ' + score;
  document.getElementById('gameover').classList.add('show');
  restartCircle = new ActionCircle('SLICE ME TO\nPLAY AGAIN', { fill: '#F72585', glow: '#ff0099' });
}

// ─── MediaPipe ────────────────────────────────────────────────────────────────
function initHandTracking() {
  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6
  });
  hands.onResults((results) => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      const tip = results.multiHandLandmarks[0][8];
      const x = (1 - tip.x) * canvas.width;
      const y = tip.y * canvas.height;
      addTrailPoint(x, y);
    } else {
      if (slashTrail.length > 0) slashTrail.shift();
    }
  });

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720
  });

  document.getElementById('status-icon').textContent = '🤚';
  document.getElementById('status-text').textContent = 'Loading Hand Tracking';
  document.getElementById('status-sub').textContent = 'Just a moment...';

  camera.start().then(() => {
    video.style.opacity = '1';
    document.getElementById('loading').classList.add('hidden');
    showReadyScreen();
  }).catch((err) => {
    document.getElementById('status-icon').textContent = '❌';
    document.getElementById('status-text').textContent = 'Camera Error';
    document.getElementById('status-sub').textContent = err.message || 'Could not access camera';
  });
}

gameLoop();
initHandTracking();
</script>
</body>
</html>
