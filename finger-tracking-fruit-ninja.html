<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Ninja AR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; user-select: none; }
  #container { position: relative; width: 100vw; height: 100vh; }

  #video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover; transform: scaleX(-1);
    opacity: 0; transition: opacity 0.5s;
  }

  /* Canvas sits on top of video, behind DOM fruits */
  #canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2; pointer-events: none;
  }

  /* Fruit DIVs live here */
  #fruit-layer {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 3; pointer-events: none;
    overflow: hidden;
  }

  .fruit {
    position: absolute;
    font-size: 80px;
    line-height: 1;
    transform-origin: center center;
    will-change: transform;
    pointer-events: none;
    /* prevent Safari from showing text cursor or selection */
    -webkit-user-select: none;
    user-select: none;
  }

  /* HUD on top of everything */
  #hud {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5; pointer-events: none;
  }

  #loading {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.92);
    z-index: 30; transition: opacity 0.5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .status-icon { font-size: 64px; margin-bottom: 20px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.7} }
  .status-text { color:#fff; font-size:22px; letter-spacing:3px; text-transform:uppercase; opacity:0.8; }
  .status-sub { color:rgba(255,255,255,0.4); font-size:13px; letter-spacing:2px; margin-top:10px; text-transform:uppercase; }

  #gameover-scrim {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.75); z-index: 10;
    opacity: 0; pointer-events: none; transition: opacity 0.5s;
  }
  #gameover-scrim.show { opacity: 1; }
  #gameover-text {
    position: absolute; top:0; left:0; width:100%; height:42%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:15; opacity:0; pointer-events:none; transition: opacity 0.5s;
  }
  #gameover-text.show { opacity:1; }
  #gameover-text h1 {
    color:#ff3333; font-size:72px;
    text-shadow:0 0 30px rgba(255,50,50,0.8),0 0 60px rgba(255,50,50,0.4);
    letter-spacing:4px; margin-bottom:16px;
    animation: glitch 0.3s ease-in-out infinite alternate;
  }
  @keyframes glitch {
    0%{text-shadow:0 0 30px rgba(255,50,50,0.8),-2px 0 rgba(0,255,255,0.5)}
    100%{text-shadow:0 0 30px rgba(255,50,50,0.8),2px 0 rgba(255,0,255,0.5)}
  }
  #final-score { color:#fff; font-size:32px; letter-spacing:2px; }

  /* Action circle (slice to start / restart) */
  #action-layer {
    position: absolute; top:0; left:0; width:100%; height:100%;
    z-index: 20; pointer-events: none;
  }
  .action-circle {
    position: absolute;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 50%;
    pointer-events: none;
    -webkit-user-select: none; user-select: none;
  }
  .action-circle .ac-emoji { font-size: 120px; line-height: 1; }
  .action-circle .ac-label {
    color: #fff; font-family: 'Arial Black', sans-serif;
    font-size: 17px; font-weight: bold;
    text-align: center; margin-top: 8px;
    text-shadow: 0 0 8px rgba(0,0,0,1), 0 0 16px rgba(0,0,0,1);
    white-space: pre-line;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>

  <canvas id="canvas"></canvas>
  <div id="fruit-layer"></div>

  <canvas id="hud-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:6;pointer-events:none;"></canvas>

  <div id="gameover-scrim"></div>
  <div id="gameover-text">
    <h1>GAME OVER</h1>
    <div id="final-score">Score: 0</div>
  </div>

  <div id="action-layer"></div>

  <div id="loading">
    <div class="status-icon" id="status-icon">📷</div>
    <div class="status-text" id="status-text">Starting Camera</div>
    <div class="status-sub" id="status-sub">Please allow camera access</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ─── Canvas setup (trail + particles only) ────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hudCanvas = document.getElementById('hud-canvas');
const hudCtx = hudCanvas.getContext('2d');
const video = document.getElementById('video');
const fruitLayer = document.getElementById('fruit-layer');
const actionLayer = document.getElementById('action-layer');

function resize() {
  canvas.width = window.innerWidth;   canvas.height = window.innerHeight;
  hudCanvas.width = window.innerWidth; hudCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Constants ────────────────────────────────────────────────────────────────
const FRUIT_EMOJIS = ['🍎','🍊','🍋','🍇','🍓','🍉','🍌','🍑','🥭','🍍','🥝','🍒','🫐','🍈','🍐','🥥'];
const BOMB_EMOJI   = '💣';
const FRUIT_COLORS = [
  {fill:'#FF4D6D',glow:'#ff0033'},{fill:'#FFD60A',glow:'#ffaa00'},
  {fill:'#06D6A0',glow:'#00ff99'},{fill:'#4CC9F0',glow:'#00ccff'},
  {fill:'#F72585',glow:'#ff0099'},{fill:'#FB5607',glow:'#ff6600'},
];

// ─── State ────────────────────────────────────────────────────────────────────
let score=0, lives=3, gameActive=false, gameOverFlag=false, readyToStart=false;
let fruits=[], particles=[], halfFruits=[], slashTrail=[];
let lastSliceTime=0, frameCount=0;
let actionCircleData=null; // { el, x, y, r, wobble, pulse, sliced, onSlice }

// ─── Fruit (DOM div) ──────────────────────────────────────────────────────────
class Fruit {
  constructor(isBomb) {
    this.isBomb   = isBomb || false;
    this.emoji    = this.isBomb ? BOMB_EMOJI : FRUIT_EMOJIS[Math.floor(Math.random()*FRUIT_EMOJIS.length)];
    this.color    = this.isBomb ? {fill:'#333',glow:'#ff4400'} : FRUIT_COLORS[Math.floor(Math.random()*FRUIT_COLORS.length)];
    this.r        = 44 + Math.random()*18;        // collision radius
    this.fontSize = this.r * 2;
    this.x        = this.r + Math.random()*(window.innerWidth - this.r*2);
    this.y        = window.innerHeight + this.r;
    this.sliced   = false;
    this.rotation = Math.random()*360;
    this.rotSpeed = (Math.random()-0.5)*4;
    const tier    = Math.random();
    const speed   = tier<0.25 ? 21+Math.random()*4 : tier<0.65 ? 15+Math.random()*4 : 10+Math.random()*3;
    const angle   = -Math.PI/2 + (Math.random()-0.5)*0.65;
    this.vx = Math.cos(angle)*speed*0.35;
    this.vy = Math.sin(angle)*speed;
    this.gravity  = 0.22;

    // Create DOM element
    this.el = document.createElement('div');
    this.el.className = 'fruit';
    this.el.textContent = this.emoji;
    this.el.style.fontSize = this.fontSize + 'px';
    fruitLayer.appendChild(this.el);
    this._updateDOM();
  }
  _updateDOM() {
    // position so emoji center = (this.x, this.y)
    const half = this.fontSize * 0.6; // emoji visual approx half-size
    this.el.style.left = (this.x - half) + 'px';
    this.el.style.top  = (this.y - half) + 'px';
    this.el.style.transform = `rotate(${this.rotation}deg)`;
  }
  update() {
    this.vy += this.gravity;
    this.x  += this.vx;
    this.y  += this.vy;
    this.rotation += this.rotSpeed;
    this._updateDOM();
  }
  isOffScreen() { return this.y > window.innerHeight + this.r + 40; }
  remove() {
    if (this.el && this.el.parentNode) this.el.parentNode.removeChild(this.el);
  }
}

// ─── Particle (canvas) ────────────────────────────────────────────────────────
class Particle {
  constructor(x,y,color) {
    this.x=x; this.y=y; this.color=color;
    const a=Math.random()*Math.PI*2, s=4+Math.random()*8;
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
    this.life=1; this.decay=0.025+Math.random()*0.02; this.r=5+Math.random()*10;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.15;this.life-=this.decay;}
  draw(){
    if(this.life<=0)return;
    ctx.save();ctx.globalAlpha=this.life;
    ctx.shadowColor=this.color.glow;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(this.x,this.y,Math.max(0.1,this.r*this.life),0,Math.PI*2);
    ctx.fillStyle=this.color.fill;ctx.fill();ctx.restore();
  }
}

// ─── Half Fruit (canvas, colored arc) ────────────────────────────────────────
class HalfFruit {
  constructor(x,y,color,dir) {
    this.x=x;this.y=y;this.color=color;
    this.vx=dir*(4+Math.random()*4);this.vy=-5-Math.random()*4;
    this.gravity=0.3;this.r=40;this.life=1;this.decay=0.02;
    this.rotation=0;this.rotSpeed=dir*0.09;
  }
  update(){this.vy+=this.gravity;this.x+=this.vx;this.y+=this.vy;this.rotation+=this.rotSpeed;this.life-=this.decay;}
  draw(){
    if(this.life<=0)return;
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rotation);
    ctx.globalAlpha=this.life;
    ctx.shadowColor=this.color.glow;ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI,false);
    ctx.fillStyle=this.color.fill;ctx.fill();
    ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI,false);
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fill();
    ctx.restore();
  }
}

// ─── Slash Trail (canvas) ─────────────────────────────────────────────────────
const TRAIL_LENGTH=18;
function addTrailPoint(x,y){slashTrail.push({x,y,t:Date.now()});if(slashTrail.length>TRAIL_LENGTH)slashTrail.shift();}
function drawTrail(){
  if(slashTrail.length<2)return;
  const now=Date.now();
  for(let i=1;i<slashTrail.length;i++){
    const p=slashTrail[i-1],c=slashTrail[i];
    const age=(now-c.t)/120,alpha=Math.max(0,1-age);
    const w=(i/slashTrail.length)*16+2;
    ctx.save();
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(c.x,c.y);
    ctx.strokeStyle=`rgba(255,255,255,${alpha*0.9})`;ctx.lineWidth=w;ctx.lineCap='round';
    ctx.shadowColor='rgba(200,220,255,0.9)';ctx.shadowBlur=22;ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(c.x,c.y);
    ctx.strokeStyle=`rgba(255,255,255,${alpha})`;ctx.lineWidth=w*0.3;ctx.shadowBlur=5;ctx.stroke();
    ctx.restore();
  }
}
function getTrailVelocity(){
  if(slashTrail.length<3)return 0;
  const a=slashTrail[0],b=slashTrail[slashTrail.length-1];
  const dx=b.x-a.x,dy=b.y-a.y,dt=(b.t-a.t)/1000||0.001;
  return Math.sqrt(dx*dx+dy*dy)/dt;
}
function lineCircleIntersect(x1,y1,x2,y2,cx,cy,r){
  const dx=x2-x1,dy=y2-y1,fx=x1-cx,fy=y1-cy;
  const a=dx*dx+dy*dy,b=2*(fx*dx+fy*dy),c=fx*fx+fy*fy-r*r;
  let d=b*b-4*a*c;if(d<0)return false;d=Math.sqrt(d);
  const t1=(-b-d)/(2*a),t2=(-b+d)/(2*a);
  return(t1>=0&&t1<=1)||(t2>=0&&t2<=1);
}

// ─── Slice effects ────────────────────────────────────────────────────────────
function spawnSliceEffect(x,y,color){
  for(let p=0;p<18;p++)particles.push(new Particle(x,y,color));
  halfFruits.push(new HalfFruit(x,y,color,-1));
  halfFruits.push(new HalfFruit(x,y,color,1));
}
function spawnExplosion(x,y){
  const bc={fill:'#FF6600',glow:'#ff2200'};
  for(let p=0;p<50;p++)particles.push(new Particle(x,y,bc));
}

// ─── Action Circle (DOM) ──────────────────────────────────────────────────────
function createActionCircle(emoji, labelText, glowColor, onSlice) {
  // remove any existing
  actionLayer.innerHTML = '';
  actionCircleData = null;

  const SIZE = 220; // diameter
  const R    = SIZE / 2;
  const cx   = window.innerWidth / 2;
  const cy   = window.innerHeight * 0.68;

  const el = document.createElement('div');
  el.className = 'action-circle';
  el.style.width  = SIZE + 'px';
  el.style.height = SIZE + 'px';
  el.style.left   = (cx - R) + 'px';
  el.style.top    = (cy - R) + 'px';

  const emojiEl = document.createElement('div');
  emojiEl.className = 'ac-emoji';
  emojiEl.textContent = emoji;

  const labelEl = document.createElement('div');
  labelEl.className = 'ac-label';
  labelEl.textContent = labelText;

  el.appendChild(emojiEl);
  el.appendChild(labelEl);
  actionLayer.appendChild(el);

  actionCircleData = {
    el, emojiEl,
    x: cx, y: cy, r: R,
    glowColor,
    pulse: 0, wobble: 0,
    sliced: false,
    onSlice
  };
}

function updateActionCircle() {
  if (!actionCircleData || actionCircleData.sliced) return;
  const ac = actionCircleData;
  ac.pulse += 0.05;
  ac.wobble = Math.sin(ac.pulse) * 6;
  const scale = 1 + Math.sin(ac.pulse * 1.3) * 0.05;
  ac.el.style.transform = `translateY(${ac.wobble}px) scale(${scale})`;
  // pulsing glow on the emoji
  const glowStrength = 20 + Math.sin(ac.pulse) * 10;
  ac.emojiEl.style.filter = `drop-shadow(0 0 ${glowStrength}px ${ac.glowColor})`;
}

// ─── HUD (canvas) ─────────────────────────────────────────────────────────────
function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function drawHUD() {
  hudCtx.clearRect(0, 0, hudCanvas.width, hudCanvas.height);
  hudCtx.save();

  // Score box
  hudCtx.font = 'bold 52px Arial Black';
  const sw = hudCtx.measureText(String(score)).width;
  const sW=sw+52,sH=76,sX=20,sY=16;
  hudCtx.fillStyle='rgba(0,0,0,0.55)';
  roundRect(hudCtx,sX,sY,sW,sH,18);hudCtx.fill();
  hudCtx.strokeStyle='rgba(255,255,255,0.18)';hudCtx.lineWidth=1.5;
  roundRect(hudCtx,sX,sY,sW,sH,18);hudCtx.stroke();
  hudCtx.fillStyle='#fff';hudCtx.textAlign='left';hudCtx.textBaseline='middle';
  hudCtx.shadowColor='rgba(255,255,255,0.6)';hudCtx.shadowBlur=14;
  hudCtx.fillText(String(score),sX+26,sY+sH/2);
  hudCtx.shadowBlur=0;hudCtx.font='13px Arial';hudCtx.fillStyle='rgba(255,255,255,0.55)';
  hudCtx.fillText('SCORE',sX+26,sY+sH+10);

  // Lives — draw colored circles (no emoji, no canvas emoji issues)
  const heartR=14,heartSpacing=38;
  const hW=3*heartSpacing+10,hH=68,hX=hudCanvas.width-hW-20,hY=16;
  hudCtx.fillStyle='rgba(0,0,0,0.55)';
  roundRect(hudCtx,hX,hY,hW,hH,18);hudCtx.fill();
  hudCtx.strokeStyle='rgba(255,255,255,0.18)';hudCtx.lineWidth=1.5;
  roundRect(hudCtx,hX,hY,hW,hH,18);hudCtx.stroke();
  for(let i=0;i<3;i++){
    const ex=hX+20+i*heartSpacing;
    const ey=hY+hH/2;
    hudCtx.beginPath();
    hudCtx.arc(ex,ey,heartR,0,Math.PI*2);
    if(i<lives){
      hudCtx.fillStyle='#ff3355';
      hudCtx.shadowColor='#ff0033';
      hudCtx.shadowBlur=10;
    } else {
      hudCtx.fillStyle='rgba(255,255,255,0.2)';
      hudCtx.shadowBlur=0;
    }
    hudCtx.fill();
    hudCtx.shadowBlur=0;
  }

  hudCtx.restore();
}

// ─── Ready Screen ─────────────────────────────────────────────────────────────
function drawReadyScreen() {
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.52)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.textAlign='center';
  ctx.font='bold 54px Arial Black';ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(255,255,255,0.5)';ctx.shadowBlur=25;
  ctx.fillText('FRUIT NINJA AR',canvas.width/2,canvas.height*0.24);
  ctx.shadowBlur=0;ctx.font='15px Arial';ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillText('POINT YOUR INDEX FINGER  ·  SWIPE FAST TO SLICE',canvas.width/2,canvas.height*0.33);
  ctx.font='14px Arial';ctx.fillStyle='rgba(255,120,120,0.9)';
  ctx.fillText('AVOID THE BOMB — instant game over!',canvas.width/2,canvas.height*0.40);
  ctx.restore();
}

// ─── Spawn ────────────────────────────────────────────────────────────────────
function maybeSpawn(){
  if(!gameActive)return;
  frameCount++;
  const interval=Math.max(45,90-Math.floor(score/5)*3);
  if(frameCount%interval===0){
    const count=Math.random()<0.25?2:1;
    for(let i=0;i<count;i++){
      const isBomb=Math.random()<(0.12+Math.min(score*0.003,0.15));
      fruits.push(new Fruit(isBomb));
    }
  }
}

// ─── Slice Detection ──────────────────────────────────────────────────────────
function checkSlice(){
  const velocity=getTrailVelocity();
  if(velocity<200)return;
  if(Date.now()-lastSliceTime<50)return;

  // Action circle
  if(actionCircleData && !actionCircleData.sliced){
    const ac=actionCircleData;
    for(let j=1;j<slashTrail.length;j++){
      if(lineCircleIntersect(
        slashTrail[j-1].x,slashTrail[j-1].y,
        slashTrail[j].x,slashTrail[j].y,
        ac.x, ac.y+ac.wobble, ac.r*0.85
      )){
        ac.sliced=true;
        lastSliceTime=Date.now();
        spawnSliceEffect(ac.x,ac.y+ac.wobble,{fill:'#fff',glow:'#fff'});
        ac.el.style.transition='opacity 0.3s';
        ac.el.style.opacity='0';
        setTimeout(ac.onSlice,400);
        return;
      }
    }
  }

  if(!gameActive)return;

  for(let i=0;i<fruits.length;i++){
    const f=fruits[i];if(f.sliced)continue;
    for(let j=1;j<slashTrail.length;j++){
      if(lineCircleIntersect(
        slashTrail[j-1].x,slashTrail[j-1].y,
        slashTrail[j].x,slashTrail[j].y,
        f.x,f.y,f.r
      )){
        f.sliced=true;
        lastSliceTime=Date.now();
        if(f.isBomb){
          spawnExplosion(f.x,f.y);
          f.remove();
          setTimeout(triggerGameOver,300);
        } else {
          score++;
          spawnSliceEffect(f.x,f.y,f.color);
          f.remove();
        }
        break;
      }
    }
  }
  fruits=fruits.filter(f=>!f.sliced);
}

// ─── Game Loop ────────────────────────────────────────────────────────────────
function gameLoop(){
  try{
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(readyToStart && !gameActive && !gameOverFlag) drawReadyScreen();

    if(gameActive){
      maybeSpawn();
      for(let i=fruits.length-1;i>=0;i--){
        fruits[i].update();
        if(fruits[i].isOffScreen()){
          if(!fruits[i].isBomb){ lives--; if(lives<=0){fruits[i].remove();fruits.splice(i,1);triggerGameOver();continue;} }
          fruits[i].remove(); fruits.splice(i,1);
        }
      }
      drawHUD();
    }

    updateActionCircle();

    for(let i=halfFruits.length-1;i>=0;i--){halfFruits[i].update();halfFruits[i].draw();if(halfFruits[i].life<=0)halfFruits.splice(i,1);}
    for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0)particles.splice(i,1);}

    drawTrail();
    checkSlice();
  } catch(e){console.error('gameLoop:',e);}
  requestAnimationFrame(gameLoop);
}

// ─── Game Control ─────────────────────────────────────────────────────────────
function clearFruits(){
  fruits.forEach(f=>f.remove());
  fruits=[];
}

function showReadyScreen(){
  readyToStart=true; gameActive=false; gameOverFlag=false;
  clearFruits();
  createActionCircle('🍉','SLICE ME\nTO START','#00ff99',startGame);
}

function startGame(){
  score=0; lives=3;
  clearFruits(); particles=[]; halfFruits=[]; slashTrail=[];
  frameCount=0; lastSliceTime=0;
  readyToStart=false; gameOverFlag=false; gameActive=true;
  actionLayer.innerHTML=''; actionCircleData=null;
  hudCtx.clearRect(0,0,hudCanvas.width,hudCanvas.height);
  document.getElementById('gameover-scrim').classList.remove('show');
  document.getElementById('gameover-text').classList.remove('show');
}

function triggerGameOver(){
  gameActive=false; gameOverFlag=true;
  clearFruits();
  document.getElementById('final-score').textContent='Score: '+score;
  document.getElementById('gameover-scrim').classList.add('show');
  document.getElementById('gameover-text').classList.add('show');
  createActionCircle('🍊','SLICE ME TO\nPLAY AGAIN','#ff0099',startGame);
}

// ─── MediaPipe Hand Tracking ──────────────────────────────────────────────────
function initHandTracking(){
  const hands=new Hands({locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
  hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.6});
  hands.onResults((results)=>{
    if(results.multiHandLandmarks && results.multiHandLandmarks.length>0){
      const tip=results.multiHandLandmarks[0][8];
      addTrailPoint((1-tip.x)*canvas.width, tip.y*canvas.height);
    } else {
      if(slashTrail.length>0)slashTrail.shift();
    }
  });

  const camera=new Camera(video,{
    onFrame:async()=>{await hands.send({image:video});},
    width:1280,height:720
  });

  document.getElementById('status-icon').textContent='🤚';
  document.getElementById('status-text').textContent='Loading Hand Tracking';
  document.getElementById('status-sub').textContent='Just a moment...';

  camera.start().then(()=>{
    video.style.opacity='1';
    document.getElementById('loading').classList.add('hidden');
    showReadyScreen();
  }).catch(()=>{
    document.getElementById('loading').innerHTML=`
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px;text-align:center;">
        <div style="font-size:64px;color:#ff4444;">✕</div>
        <div style="color:#fff;font-size:22px;letter-spacing:3px;text-transform:uppercase;font-weight:bold;">Camera Error</div>
        <div style="color:rgba(255,255,255,0.45);font-size:13px;letter-spacing:2px;text-transform:uppercase;">Permission Denied</div>
        <div style="color:rgba(255,255,255,0.35);font-size:12px;max-width:300px;line-height:1.6;margin-top:8px;">
          Camera access is blocked in embedded frames. Open the game directly for the full AR experience.
        </div>
        <a href="https://otanyjoseph.github.io/ai-projects/finger-tracking-fruit-ninja.html"
          target="_blank"
          style="margin-top:16px;padding:16px 36px;background:linear-gradient(135deg,#06D6A0,#4CC9F0);color:#000;font-size:15px;font-weight:900;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border-radius:50px;box-shadow:0 0 30px rgba(6,214,160,0.5);display:inline-block;">
          Open Full Experience →
        </a>
        <div style="color:rgba(255,255,255,0.2);font-size:11px;letter-spacing:1px;margin-top:4px;">OPENS IN NEW TAB</div>
      </div>`;
  });
}

gameLoop();
initHandTracking();
</script>
