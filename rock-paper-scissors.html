<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPS Battle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f2ee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    max-width: 860px;
    margin: 0 auto;
    font-family: 'DM Mono', monospace;
  }

  .wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; padding: 24px 40px; }

  .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #d0d0c8; padding-bottom: 12px; width: 100%; }
  .title { font-size: 22px; font-weight: 300; letter-spacing: -1px; color: #1a1a1a; }
  .title strong { font-weight: 700; }
  .counts { font-size: 11px; color: #888; letter-spacing: 0.5px; text-align: right; line-height: 1.8; }

  #game-canvas { border: 1.5px solid #1a1a1a; cursor: default; display: block; box-shadow: 4px 4px 0px #1a1a1a; }

  .btn-row { display: flex; gap: 10px; align-items: stretch; }

  .ctrl-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: #fff;
    color: #1a1a1a;
    border: 1.5px solid #1a1a1a;
    padding: 0 22px;
    height: 38px;
    cursor: pointer;
    box-shadow: 3px 3px 0px #1a1a1a;
    transition: box-shadow 0.1s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    white-space: nowrap;
  }
  .ctrl-btn:hover { box-shadow: 1px 1px 0px #1a1a1a; transform: translate(2px, 2px); }
  .ctrl-btn:active { box-shadow: none; transform: translate(3px, 3px); }

  .bulb-off .bulb-glow { display: none; }
  .bulb-off .bulb-glass { fill: #888; }
  .bulb-off .bulb-base { fill: #666; }
  .bulb-off .bulb-filament { stroke: #555; }

  .bulb-on .bulb-glow { display: block; }
  .bulb-on .bulb-glass { fill: #ffe066; }
  .bulb-on .bulb-base { fill: #aaa; }
  .bulb-on .bulb-filament { stroke: #f90; }

  .footer { font-size: 10px; letter-spacing: 0.2em; color: #ccc; text-transform: uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">RPS<br><strong>Battle</strong></div>
    <div class="counts" id="counts">🪨 0 &nbsp; 📄 0 &nbsp; ✂️ 0</div>
  </div>
  <canvas id="game-canvas"></canvas>
  <div class="btn-row">
    <button class="ctrl-btn" onclick="restartGame()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M11 6.5A4.5 4.5 0 1 1 6.5 2a4.47 4.47 0 0 1 3 1.15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <polyline points="9.5,1 9.5,3.5 12,3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      restart
    </button>
    <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <polygon points="2,5 5,5 8,2 8,13 5,10 2,10" fill="currentColor"/>
        <g id="vol-waves">
          <path d="M10 5.5a3 3 0 0 1 0 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <path d="M11.5 3.5a5.5 5.5 0 0 1 0 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        </g>
        <g id="vol-mute" style="display:none">
          <line x1="10" y1="5" x2="14" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="14" y1="5" x2="10" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </g>
      </svg>
      volume
    </button>
    <button class="ctrl-btn" id="lights-btn" onclick="toggleLights()">
      <svg id="bulb-svg" class="bulb-off" width="14" height="18" viewBox="0 0 16 20" fill="none">
        <circle class="bulb-glow" cx="8" cy="7.5" r="7" fill="#ffe06644"/>
        <path class="bulb-glass" d="M3 7.5a5 5 0 1 1 7.5 4.33V13H5.5v-1.17A5 5 0 0 1 3 7.5z"/>
        <rect class="bulb-base" x="5.5" y="13" width="5" height="1.2" rx="0.4"/>
        <rect class="bulb-base" x="5.5" y="14.5" width="5" height="1.2" rx="0.4"/>
        <path class="bulb-filament" d="M6.5 11.5 Q8 9.5 9.5 11.5" stroke-width="1.1" stroke-linecap="round" fill="none"/>
      </svg>
      lights
    </button>
  </div>
  <div class="footer">watch · wait · winner</div>
</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = Math.min(window.innerWidth - 80, 780);
const H = Math.round(W * 0.9);
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

const NUM = 40, SIZE = 30, SPEED = 2;
const ROCK = 0, PAPER = 1, SCISSORS = 2;
let elements = [], winner = null, animId = null, muted = true, lightMode = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTick() {
  if (muted) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.02, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.005));
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.18;
  src.connect(gain); gain.connect(audioCtx.destination); src.start();
}

function toggleMute() {
  muted = !muted;
  if (!muted) audioCtx.resume();
  document.getElementById('vol-waves').style.display = muted ? 'none' : 'block';
  document.getElementById('vol-mute').style.display = muted ? 'block' : 'none';
}

function toggleLights() {
  lightMode = !lightMode;
  const bulb = document.getElementById('bulb-svg');
  bulb.className = lightMode ? 'bulb-on' : 'bulb-off';
}

const IMGS = [rockImg, paperImg, scissorsImg];

function initializeElements() {
  elements = [];
  for (let i = 0; i < NUM; i++) {
    let vx = (Math.random()-0.5)*SPEED*2, vy = (Math.random()-0.5)*SPEED*2;
    if (Math.abs(vx)<0.5) vx=0.5*Math.sign(vx||1);
    if (Math.abs(vy)<0.5) vy=0.5*Math.sign(vy||1);
    elements.push({ x: SIZE+Math.random()*(W-SIZE*2), y: SIZE+Math.random()*(H-SIZE*2), type: i%3, vx, vy });
  }
  winner = null;
}

function handleCollision(a, b) {
  const beat = (t1,t2) => (t1===ROCK&&t2===SCISSORS)||(t1===SCISSORS&&t2===PAPER)||(t1===PAPER&&t2===ROCK);
  if (beat(a.type,b.type)) { b.type=a.type; playTick(); }
  else if (beat(b.type,a.type)) { a.type=b.type; playTick(); }
}

function updateCounts() {
  const r=elements.filter(e=>e.type===ROCK).length;
  const p=elements.filter(e=>e.type===PAPER).length;
  const s=elements.filter(e=>e.type===SCISSORS).length;
  document.getElementById('counts').innerHTML=`🪨 ${r} &nbsp; 📄 ${p} &nbsp; ✂️ ${s}`;
}

function getWinnerLabel(typeSet) {
  const t = [...typeSet][0];
  if (t === ROCK) return 'ROCK 🪨 wins!';
  if (t === PAPER) return 'PAPER 📄 wins!';
  return 'SCISSORS ✂️ win!';
}

function draw() {
  const bg = lightMode ? '#ffffff' : '#000000';
  const winnerOverlay = lightMode ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.80)';
  const winnerText = lightMode ? '#1a1a1a' : '#ffcc00';
  const winnerStroke = lightMode ? 'rgba(255,255,255,0.8)' : '#000';

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  for (let i=0; i<elements.length; i++) {
    const el=elements[i];
    el.x+=el.vx; el.y+=el.vy;
    if (el.x<SIZE/2){el.x=SIZE/2;el.vx=Math.abs(el.vx);}
    if (el.x>W-SIZE/2){el.x=W-SIZE/2;el.vx=-Math.abs(el.vx);}
    if (el.y<SIZE/2){el.y=SIZE/2;el.vy=Math.abs(el.vy);}
    if (el.y>H-SIZE/2){el.y=H-SIZE/2;el.vy=-Math.abs(el.vy);}
    for (let j=i+1; j<elements.length; j++) {
      const o=elements[j], dx=o.x-el.x, dy=o.y-el.y;
      if (dx*dx+dy*dy<SIZE*SIZE) {
        handleCollision(el,o);
        const angle=Math.atan2(dy,dx);
        const ax=Math.cos(angle)*0.01*SIZE, ay=Math.sin(angle)*0.01*SIZE;
        el.vx-=ax; el.vy-=ay; o.vx+=ax; o.vy+=ay;
        const clamp=v=>Math.max(-SPEED*2,Math.min(SPEED*2,v));
        el.vx=clamp(el.vx);el.vy=clamp(el.vy);o.vx=clamp(o.vx);o.vy=clamp(o.vy);
      }
    }
    ctx.drawImage(IMGS[el.type], el.x-SIZE/2, el.y-SIZE/2, SIZE, SIZE);
  }

  updateCounts();
  const types=new Set(elements.map(e=>e.type));
  if (types.size===1) {
    const label = getWinnerLabel(types);
    ctx.fillStyle=winnerOverlay; ctx.fillRect(0,0,W,H);
    ctx.font='700 42px "DM Serif Display",serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle=winnerStroke; ctx.lineWidth=4;
    ctx.strokeText(label, W/2, H/2);
    ctx.fillStyle=winnerText; ctx.fillText(label, W/2, H/2);
    return;
  }
  animId=requestAnimationFrame(draw);
}

function restartGame() {
  if (animId) cancelAnimationFrame(animId);
  initializeElements();
  animId=requestAnimationFrame(draw);
}

let loaded=0;
[rockImg,paperImg,scissorsImg].forEach(img=>{ img.onload=()=>{ if(++loaded===3) restartGame(); }; });
</script>
