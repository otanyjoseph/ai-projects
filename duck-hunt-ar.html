<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Duck Hunt AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:monospace;cursor:none}
#container{position:relative;width:100vw;height:100vh}
#gameCanvas{position:absolute;inset:0;width:100%;height:100%}
/* Crosshair overlay — always on top of everything */
#crosshairCanvas{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
  z-index:9999;
}
#video{
  position:absolute;right:16px;bottom:16px;
  width:196px;height:148px;object-fit:cover;
  transform:scaleX(-1);opacity:0;transition:opacity .3s;
  border:4px solid #f8f8f8;
  box-shadow:0 0 0 3px #000,0 0 0 6px #6a6a6a;
  z-index:10;image-rendering:pixelated;
}
#video.show{opacity:.92}
#camLabel{
  position:absolute;right:16px;bottom:168px;z-index:11;
  background:#000;color:#f8f8f8;border:3px solid #555;
  padding:2px 8px;font-size:9px;letter-spacing:2px;
}
#loading{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;background:#78a8f0;z-index:20;transition:opacity .5s;
}
#loading.hidden{opacity:0;pointer-events:none}
.nes-box{
  background:#000;color:#fff;border:6px solid #f8f8f8;
  padding:36px 52px;text-align:center;
  box-shadow:inset -4px -4px 0 #555,inset 4px 4px 0 #fff,10px 10px 0 rgba(0,0,0,0.5);
  image-rendering:pixelated;
}
.nes-title{font-size:48px;letter-spacing:6px;color:#fcd000;margin-bottom:14px;text-shadow:4px 4px 0 #d82800,6px 6px 0 #8a1000;font-weight:900;text-transform:uppercase}
.nes-sub{font-size:13px;letter-spacing:3px;color:#98d800;animation:blink 1s step-end infinite;font-weight:bold;text-transform:uppercase}
@keyframes blink{50%{opacity:0}}
</style>
</head>

function drawPixelHand(cx, cy, s) {
  const frame = handFrame === 0 ? frameUp : frameDownBang;
  const offX = cx - (HAND_COLS * s) / 2;
  const offY = cy - (HAND_ROWS * s) / 2;
  for (let r = 0; r < HAND_ROWS; r++) {
    for (let c = 0; c < HAND_COLS; c++) {
      const color = frame[r][c];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(offX + c * s, offY + r * s, s, s);
    }
  }
}

function stableAim(){
  if(!aimBuf.length) return {x:smoothAim.x,y:smoothAim.y};
  return{x:aimBuf.reduce((s,p)=>s+p.x,0)/aimBuf.length,y:aimBuf.reduce((s,p)=>s+p.y,0)/aimBuf.length};
}
function updateAim(){
  if(rawAim.x>-500){
    smoothAim.x+=(rawAim.x-smoothAim.x)*AIM_LERP;
    smoothAim.y+=(rawAim.y-smoothAim.y)*AIM_LERP;
    if(isGunPose) pushAim(smoothAim.x,smoothAim.y);
  }
}

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function vdist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function vnorm(v){const m=Math.hypot(v.x,v.y)||1;return{x:v.x/m,y:v.y/m}}

  const a=0.22;
  openBaseline.radial+=(Math.hypot(lt.x,lt.y)-openBaseline.radial)*a;
  openBaseline.spread+=(Math.abs(lt.x)-openBaseline.spread)*a;
}

function measureThumbPress(lm){
  const palm=palmCenter(lm);
  const scale=Math.max(0.0001,vdist(lm[5],lm[17]));
  const xAxis=vnorm({x:lm[17].x-lm[5].x,y:lm[17].y-lm[5].y});
  let yAxis=vnorm({x:lm[9].x-lm[0].x,y:lm[9].y-lm[0].y});
  if(Math.abs(vdot(xAxis,yAxis))>.75) yAxis={x:-xAxis.y,y:xAxis.x};
  const tl=projectLocal(lm[4],palm,xAxis,yAxis,scale);
  const radial=Math.hypot(tl.x,tl.y), spread=Math.abs(tl.x);
  const rotNow=palmAngleF(lm);
  palmMove=prevPalmCenter?vdist(palm,prevPalmCenter)/scale:0;
  rotDelta=prevPalmAngle!=null?angleDelta(rotNow,prevPalmAngle):0;
  prevPalmCenter=palm; prevPalmAngle=rotNow;
  const stable=palmMove<MOVE_GATE&&rotDelta<ROT_GATE;
  if((thumbState==='unknown'||thumbState==='armed')&&stable){
    if(!openBaseline||radial>(openBaseline.radial*0.86)||spread>(openBaseline.spread*0.86))
      updateOpenBaseline(tl);
  }
  const bRad=openBaseline?Math.max(0.18,openBaseline.radial):Math.max(0.18,radial);
  const bSprd=openBaseline?Math.max(0.12,openBaseline.spread):Math.max(0.12,spread);
  const pRad=clamp((bRad-radial)/(bRad*0.42),0,1);
  const pSprd=clamp((bSprd-spread)/(bSprd*0.55),0,1);
  const rawCurl=pRad*0.65+pSprd*0.35;
  smoothCurl+=(rawCurl-smoothCurl)*CURL_LERP;
  return{stable,smoothCurl};
}

function checkThumbShoot(lm,now){
  const m=measureThumbPress(lm);
  if(thumbState==='unknown'||thumbState==='fired'){
    if(m.smoothCurl<OPEN_THRESH) thumbState='armed';
  }
  if(thumbState==='armed'){
    if(m.smoothCurl>CLOSE_THRESH){
      thumbState='fired';
      lastShotTime=now;return true;
    }
  }
  if(thumbState==='fired'&&m.smoothCurl<OPEN_THRESH*0.88){
    thumbState='armed';
  }
  return false;
}

function detectGunPose(lm){
  const palm = palmCenter(lm);
  const scale = Math.max(0.0001, vdist(lm[5], lm[17]));
  function fingerExtended(tipIdx, midIdx, mcpIdx){
    const tipDist = vdist(lm[tipIdx], lm[mcpIdx]);
    const midDist = vdist(lm[midIdx], lm[mcpIdx]);
    return tipDist > midDist * 1.1;
  }
  function fingerCurled(tipIdx, mcpIdx){
    return vdist(lm[tipIdx], palm) / scale < 0.7;
  }
  const indexExt  = fingerExtended(8,  6,  5);
  const middleExt = fingerExtended(12, 10, 9);
  const ringCurl  = fingerCurled(16, 13);
  const pinkyCurl = fingerCurled(20, 17);
  return indexExt && middleExt && ringCurl && pinkyCurl;
}

const DS=7;
class Duck{
  constructor(){
    const left=Math.random()<0.5;
    this.x=left?-120:canvas.width+120;
    this.y=canvas.height*0.14+Math.random()*canvas.height*0.34;
    const scale=canvas.width/800;
    const spd=(0.5+round*0.3+Math.random()*1.2)*scale;
    this.vx=(left?1:-1)*spd; this.vy=(Math.random()-.5)*1.5;
    this.hit=false;this.falling=false;this.dead=false;
    this.flap=0;this.t=0;this.popup=0;this.fallVy=0;
    this.escaped=false;this._ec=false;
    const pals=[
      {body:'#5a46d6',head:'#e87ab8',beak:'#fc8c30',feet:'#fc8c30',wing:'#f8f8f8'},
      {body:'#1e6a00',head:'#006800',beak:'#fcd000',feet:'#fc7460',wing:'#f8f8f8'},
      {body:'#8a3800',head:'#6a2800',beak:'#fc8c30',feet:'#fc8c30',wing:'#f8f8f8'},
    ];
    this.pal=pals[Math.floor(Math.random()*pals.length)];
  }
  update(){
    if(this.falling){
      this.fallVy+=0.45;this.y+=this.fallVy;this.x+=this.vx*0.15;
      if(this.y>canvas.height+120)this.dead=true;return;
    }
    this.t++;if(this.t%6===0)this.flap=(this.flap+1)%2;
    this.x+=this.vx;this.y+=this.vy;
    const top=canvas.height*0.05,bot=canvas.height*0.58;
    if(this.y<top)this.vy=Math.abs(this.vy)+0.3;
    if(this.y>bot)this.vy=-Math.abs(this.vy)-0.3;
    if(this.x<-180||this.x>canvas.width+180){this.escaped=true;this.dead=true;}
    if(this.popup>0)this.popup--;
  }
  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    if(this.vx<0)ctx.scale(-1,1);
    if(this.falling)ctx.rotate(Math.PI/2.5);
    this._px();
    ctx.restore();
    if(this.popup>0){
      ctx.save();ctx.globalAlpha=this.popup/38;
      ctx.font='bold 24px monospace';ctx.fillStyle=C.yellow;ctx.textAlign='center';
      ctx.fillText('500',this.x,this.y-58+(38-this.popup)*.6);
      ctx.restore();
    }
  }
  _px(){
    const s=DS,p=this.pal;
    const px=(arr,c)=>{ctx.fillStyle=c;arr.forEach(([x,y])=>ctx.fillRect(x*s,y*s,s,s));};
    px([[0,2],[1,2],[2,2],[3,2],[4,2],[1,3],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4]],p.wing);
    px([[2,1],[3,1],[4,1],[5,1],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[1,3],[2,3]],p.body);
    px(this.flap?[[0,1],[1,1],[0,0],[1,0]]:[[0,3],[1,4],[0,4]],p.body);
    px([[6,1],[7,1],[8,1],[6,2],[7,2]],p.head);
    px([[8,2],[9,2],[9,1]],p.beak);
    px([[2,5],[3,5]],p.feet);
    ctx.fillStyle='#000';ctx.fillRect(7*s+1,1*s+1,s-1,s-1);
    ctx.fillStyle='#f8f8f8';ctx.fillRect(7*s+1,1*s+1,3,3);
  }
}

    if(life>0.35){
      ctx.shadowBlur=12;ctx.font='bold 20px monospace';
      ctx.fillStyle=s.hit?C.yellow:C.red;ctx.textAlign='center';
      ctx.globalAlpha=life;
      ctx.fillText(s.hit?'BANG!':'MISS',s.x,s.y-30-age*.045);
    }
    ctx.restore();
  }
}

// ── Ready Screen (HOME) ───────────────────────────────────────────────────────
let startBtnX, startBtnY, startBtnR;
let readyPulse = 0;

// Practice ducks on home screen (3x3 grid top-right)
const practiceDucks = [];
(function initPracticeDucks(){
  for(let row=0;row<3;row++) for(let col=0;col<3;col++){
    practiceDucks.push({
      col,row,
      flap:Math.floor(Math.random()*2),
      flapTimer:Math.floor(Math.random()*12),
      hit:false,
      hitTimer:0,
      floatPhase:Math.random()*Math.PI*2,
    });
  }
})();

// Home screen shot effects (bang on screen)
let homeShotEffects = [];

function drawNESArrow(x1,y1,x2,y2){
  ctx.save();
  // 3D shadow
  ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=5;
  ctx.beginPath();ctx.moveTo(x1+3,y1+3);ctx.lineTo(x2+3,y2+3);ctx.stroke();
  const ang=Math.atan2(y2-y1,x2-x1),hs=13;
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.beginPath();ctx.moveTo(x2+3,y2+3);
  ctx.lineTo(x2+3-hs*Math.cos(ang-0.45),y2+3-hs*Math.sin(ang-0.45));
  ctx.lineTo(x2+3-hs*Math.cos(ang+0.45),y2+3-hs*Math.sin(ang+0.45));
  ctx.closePath();ctx.fill();
  // white arrow
  ctx.strokeStyle=C.white;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.fillStyle=C.white;
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hs*Math.cos(ang-0.45),y2-hs*Math.sin(ang-0.45));
  ctx.lineTo(x2-hs*Math.cos(ang+0.45),y2-hs*Math.sin(ang+0.45));
  ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawNESLabel(x,y,lines,align,size){
  const fs=size||13;
  ctx.save();
  ctx.font=`bold ${fs}px monospace`;
  ctx.textAlign=align||'left';
  ctx.textBaseline='top';
  const lh=fs+5;
  // 3D shadow offset
  ctx.fillStyle='rgba(0,0,0,0.9)';
  lines.forEach((l,i)=>ctx.fillText(l,x+2,y+i*lh+2));
  ctx.fillStyle='rgba(0,0,0,0.9)';
  lines.forEach((l,i)=>ctx.fillText(l,x+3,y+i*lh+3));
  ctx.fillStyle=C.white;
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lh));
  ctx.restore();
}

// Mini duck pixel for practice grid
function drawMiniDuck(x,y,s,flap,pal){
  const px=(arr,c)=>{ctx.fillStyle=c;arr.forEach(([dx,dy])=>ctx.fillRect(x+dx*s,y+dy*s,s,s));};
  px([[0,2],[1,2],[2,2],[3,2],[4,2],[1,3],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4]],pal.wing);
  px([[2,1],[3,1],[4,1],[5,1],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[1,3],[2,3]],pal.body);
  px(flap?[[0,1],[1,1],[0,0],[1,0]]:[[0,3],[1,4],[0,4]],pal.body);
  px([[6,1],[7,1],[8,1],[6,2],[7,2]],pal.head);
  px([[8,2],[9,2],[9,1]],pal.beak);
  px([[2,5],[3,5]],pal.feet);
  ctx.fillStyle='#000';ctx.fillRect(x+7*s+1,y+1*s+1,s-1,s-1);
  ctx.fillStyle='#f8f8f8';ctx.fillRect(x+7*s+1,y+1*s+1,3,3);
}

const miniPals=[
  {body:'#5a46d6',head:'#e87ab8',beak:'#fc8c30',feet:'#fc8c30',wing:'#f8f8f8'},
  {body:'#1e6a00',head:'#006800',beak:'#fcd000',feet:'#fc7460',wing:'#f8f8f8'},
  {body:'#8a3800',head:'#6a2800',beak:'#fc8c30',feet:'#fc8c30',wing:'#f8f8f8'},
];

function drawReady(){
  const W=canvas.width, H=canvas.height;
  drawScene(); drawGrass();

  // ── Responsive scale ───────────────────────────────────────────────────────
  const scale = Math.min(W/1280, H/720);

  // ── Title box — NES block style matching loading screen ───────────────────
  const titleFs = Math.round(Math.max(28, 42*scale));
  const subFs = Math.round(Math.max(10, 13*scale));
  ctx.font=`bold ${titleFs}px monospace`;
  const titleTextW = ctx.measureText('DUCK HUNT AR').width;
  const titleW = Math.min(titleTextW + 80*scale, W*0.85);
  const titleH = (titleFs + subFs + 44)*scale;
  const titleX = (W-titleW)/2, titleY = H*0.03;

  // NES box shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(titleX+8,titleY+8,titleW,titleH+8);
  ctx.fillStyle='#000';ctx.fillRect(titleX,titleY,titleW,titleH);
  ctx.strokeStyle=C.white;ctx.lineWidth=5;ctx.strokeRect(titleX,titleY,titleW,titleH);
  ctx.strokeStyle='#555';ctx.lineWidth=2;ctx.strokeRect(titleX+6,titleY+6,titleW-12,titleH-12);
  ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(titleX+6,titleY+6,titleW-12,titleH-12);

  // Title text: yellow with red 3D shadow
  ctx.font=`bold ${titleFs}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
  const titleMidY = titleY + titleH*0.44;
  ctx.fillStyle='#8a1000';ctx.fillText('DUCK HUNT AR',W/2+6,titleMidY+6);
  ctx.fillStyle='#d82800';ctx.fillText('DUCK HUNT AR',W/2+3,titleMidY+3);
  ctx.fillStyle=C.yellow;ctx.fillText('DUCK HUNT AR',W/2,titleMidY);

  // Sub copy: green, blinking
  if(Math.floor(Date.now()/600)%2===0){
    ctx.font=`bold ${subFs}px monospace`;ctx.fillStyle='#98d800';
    ctx.fillText('POINT YOUR FINGER. SHOOT WITH YOUR THUMB.',W/2,titleY+titleH*0.82);
  }

  // ── HOW TO HOLD copy block with hand INSIDE ────────────────────────────────
  const copyFs = Math.round(Math.min(11*scale, 13));
  const copyLh = copyFs + 7;
  const copyLines = [
    'HOW TO HOLD YOUR HAND:',
    '',
    'Keep hand parallel to camera.',
    'Thumb + 2 fingers visible.',
    '',
    'INDEX + MIDDLE = AIM',
    'PRESS THUMB    = SHOOT',
  ];
  ctx.font=`bold ${copyFs}px monospace`;
  const maxCopyW = copyLines.reduce((m,l)=>Math.max(m,ctx.measureText(l).width),0);

  // Hand (50% smaller than original)
  const HAND_PX = Math.max(4, Math.round(5 * scale));
  const handW = HAND_COLS * HAND_PX;
  const handH = HAND_ROWS * HAND_PX;

  const textBlockH = copyLines.length * copyLh + 20;
  const boxInnerH = Math.max(handH + 24, textBlockH);
  const bw = maxCopyW + handW + 48*scale + 32;
  const bh = boxInnerH + 28;
  const copyX = (W - bw) / 2;
  const copyY = titleY + titleH + H*0.03;

  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.80)';ctx.fillRect(copyX,copyY,bw,bh);
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=2;ctx.strokeRect(copyX,copyY,bw,bh);

  // Draw text on left inside box
  ctx.font=`bold ${copyFs}px monospace`;ctx.textAlign='left';ctx.textBaseline='top';
  const textX = copyX + 14;
  const textY = copyY + 14;
  copyLines.forEach((l,i)=>{
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillText(l,textX+2,textY+i*copyLh+2);
    ctx.fillStyle= i===0 ? C.yellow : (l.includes('INDEX')||l.includes('PRESS')) ? C.white : 'rgba(255,255,255,0.78)';
    ctx.fillText(l,textX,textY+i*copyLh);
  });

  // Draw hand on right inside box, vertically centered
  const handAreaX = copyX + maxCopyW + 40*scale;
  const handCX = handAreaX + handW/2 + 8;
  const handCY = copyY + bh/2;
  drawPixelHand(handCX, handCY, HAND_PX);
  ctx.restore();

  // ── START button ──────────────────────────────────────────────────────────
  readyPulse += 0.06;
  const pr = Math.round((70 + Math.sin(readyPulse) * 5) * scale);
  const bx = W * 0.82, by = H * 0.50;
  startBtnX = bx; startBtnY = by; startBtnR = pr;

  ctx.save();
  ctx.translate(bx, by);
  ctx.shadowColor = '#06D6A0'; ctx.shadowBlur = Math.abs(Math.sin(readyPulse)) * 28 + 8;
  ctx.beginPath(); ctx.arc(0,0,pr,0,Math.PI*2);
  ctx.fillStyle = '#06D6A0'; ctx.fill();
  try{
    const sh=ctx.createRadialGradient(-pr*.3,-pr*.3,1,-pr*.3,-pr*.3,pr*.7);
    sh.addColorStop(0,'rgba(255,255,255,0.42)');sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.shadowBlur=0;ctx.fillStyle=sh;ctx.beginPath();ctx.arc(0,0,pr,0,Math.PI*2);ctx.fill();
  }catch(e){}
  ctx.shadowBlur=0;
  const bfs=Math.round(13*scale);
  ctx.font=`bold ${bfs}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=C.black;
  ctx.fillText('AIM HERE',0,-(bfs+2));
  ctx.fillText('+ SHOOT',0,2);
  ctx.fillText('TO START',0,bfs+6);
  ctx.restore();

  // ── Practice duck grid — CENTERED below title, progressive reveal ─────────
  // Count how many ducks have been shot (permanently dead = shot and hitTimer expired)
  const totalShot = practiceDucks.filter(d=>d.permanentlyShot).length;
  // Number to show: start at 1, add 1 for each shot, up to 9
  const ducksToShow = Math.min(9, totalShot + 1);

  const gridCols=3, gridRows=3;
  const ds=Math.max(4, Math.round(5*scale));
  const duckW=10*ds, duckH=6*ds;
  const gridPad=14*scale;
  const gridW=gridCols*duckW + (gridCols-1)*gridPad;
  const gridH=gridRows*duckH + (gridRows-1)*gridPad;
  // Center horizontally, place below copy box
  const gridX = (W - gridW) / 2;
  const gridY = copyY + bh + H*0.04;

  // "PRACTICE SHOOTING" label above grid
  const practiceFs=Math.round(12*scale);
  ctx.save();
  ctx.font=`bold ${practiceFs}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillText('PRACTICE SHOOTING',W/2+2,gridY-6+2);
  ctx.fillStyle=C.yellow;ctx.fillText('PRACTICE SHOOTING',W/2,gridY-6);

  if(totalShot===9){
    const allFs=Math.round(10*scale);
    ctx.font=`bold ${allFs}px monospace`;
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillText('ALL DUCKS HIT! WELL DONE!',W/2+2,gridY-6+allFs+10+2);
    ctx.fillStyle='#98d800';ctx.fillText('ALL DUCKS HIT! WELL DONE!',W/2,gridY-6+allFs+10);
  }
  ctx.restore();

  // Grid box
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;
  ctx.fillRect(gridX-10,gridY-10,gridW+20,gridH+20);
  ctx.strokeRect(gridX-10,gridY-10,gridW+20,gridH+20);
  ctx.restore();

  // Update and draw practice ducks — only show up to ducksToShow
  const now=Date.now();
  practiceDucks.forEach((d,i)=>{
    // Only render if within the visible count
    if(i >= ducksToShow) return;

    d.flapTimer++;
    if(d.flapTimer>10){d.flap=(d.flap+1)%2;d.flapTimer=0;}
    const bob=Math.sin(now*0.002+d.floatPhase)*4*scale;
    const dx=gridX+d.col*(duckW+gridPad);
    const dy=gridY+d.row*(duckH+gridPad)+bob;
    d.screenX=dx+duckW/2; d.screenY=dy+duckH/2;

    if(d.hit){
      d.hitTimer--;
      if(d.hitTimer<=0){d.hit=false; d.permanentlyShot=true;}
      ctx.save();ctx.globalAlpha=d.hitTimer/40;
      ctx.font=`bold ${Math.round(16*scale)}px monospace`;
      ctx.fillStyle=C.yellow;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('💥',dx+duckW/2,dy+duckH/2-(40-d.hitTimer)*0.4*scale);
      ctx.restore();
    } else if(!d.permanentlyShot){
      drawMiniDuck(dx, dy, ds, d.flap, miniPals[i%3]);
    }
  });

  // Home shot effects (BANG)
  homeShotEffects = homeShotEffects.filter(s=>now-s.t<500);
  for(const s of homeShotEffects){
    const age=now-s.t, life=1-age/500;
    ctx.save();ctx.globalAlpha=life*life;
    ctx.strokeStyle=s.duck?C.yellow:C.white;
    ctx.lineWidth=3;ctx.shadowColor=s.duck?C.yellow:C.white;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(s.x,s.y,14+age/10,0,Math.PI*2);ctx.stroke();
    if(life>0.3){
      ctx.shadowBlur=10;
      ctx.font=`bold ${Math.round(22*scale)}px monospace`;
      ctx.fillStyle=s.duck?C.yellow:C.white;ctx.textAlign='center';
      ctx.globalAlpha=life;
      ctx.fillText('BANG!',s.x,s.y-28-age*0.04);
    }
    ctx.restore();
  }

  drawHUD();
  drawStatus();
  drawCrosshair(smoothAim.x, smoothAim.y);
}

// ── Game Over ─────────────────────────────────────────────────────────────────
function drawGameOver(){
  drawScene();drawGrass();drawHUD();drawStatus();
  drawCrosshair(smoothAim.x,smoothAim.y);
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='rgba(0,0,0,0.80)';ctx.fillRect(W/2-245,H*.22,490,265);
  ctx.strokeStyle=C.red;ctx.lineWidth=4;ctx.strokeRect(W/2-245,H*.22,490,265);
  ctx.textAlign='center';
  ctx.font='bold 46px monospace';ctx.fillStyle=C.red;ctx.fillText('GAME OVER',W/2,H*.22+62);
  ctx.font='bold 20px monospace';ctx.fillStyle=C.white;ctx.fillText('FINAL: '+String(score).padStart(6,'0'),W/2,H*.22+108);
  ctx.font='14px monospace';ctx.fillStyle=C.yellow;ctx.fillText('ROUND '+round+'   DUCKS HIT: '+ducksHit,W/2,H*.22+144);
  ctx.font='bold 13px monospace';ctx.fillStyle=Math.floor(Date.now()/500)%2===0?C.white:'#555';
  ctx.fillText('AIM AT SCREEN + SHOOT TO PLAY AGAIN',W/2,H*.22+212);
}

// ── Game Logic ────────────────────────────────────────────────────────────────
function spawnDucks(){ducks=[new Duck(),new Duck()];}

function startGame(){
  score=0;round=1;ducksHit=0;ducksMissed=0;
  bulletsLeft=BULLETS;totalHits=[];
  ducks=[];feathers=[];shotEffects=[];
  dogAnim=null;nextRoundTimer=null;
  thumbState='unknown';stableCount=0;openBaseline=null;
  state='playing';spawnDucks();
}

function onRoundEnd(){
  if(nextRoundTimer)return;
  nextRoundTimer=setTimeout(()=>{
    nextRoundTimer=null;
    if(ducksMissed>=10){state='gameover';return;}
    round++;bulletsLeft=BULLETS;
    ducks=[];feathers=[];shotEffects=[];dogAnim=null;
    spawnDucks();
  },1800);
}

function shoot(){
  if(state==='ready'){
    const aim=stableAim();
    muzzleFlash=10;
    // Count visible ducks
    const totalShot = practiceDucks.filter(d=>d.permanentlyShot).length;
    const ducksToShow = Math.min(9, totalShot + 1);
    let hitDuck=false;
    practiceDucks.forEach((d,i)=>{
      if(i >= ducksToShow) return; // not visible yet
      if(!d.hit && !d.permanentlyShot && Math.hypot(aim.x-d.screenX,aim.y-d.screenY)<40){
        d.hit=true; d.hitTimer=40;
        hitDuck=true;
        homeShotEffects.push({x:aim.x,y:aim.y,t:Date.now(),duck:true});
      }
    });
    if(!hitDuck){
      homeShotEffects.push({x:aim.x,y:aim.y,t:Date.now(),duck:false});
    }
    // Start game only if aimed at green button
    if(Math.hypot(aim.x-startBtnX,aim.y-startBtnY)<=startBtnR){
      startGame();
    }
    return;
  }
  if(state==='gameover'){
    startGame();
    return;
  }
  if(state!=='playing'||bulletsLeft<=0)return;
  const aim=stableAim();
  bulletsLeft--;muzzleFlash=10;
  let hit=false;
  for(const d of ducks){
    if(d.dead||d.hit)continue;
    if(Math.hypot(aim.x-d.x,aim.y-d.y)<70){
      d.hit=true;d.falling=true;d.popup=42;d.fallVy=-2.5;
      score+=500;ducksHit++;
      totalHits.push(true);if(totalHits.length>10)totalHits.shift();
      for(let f=0;f<18;f++)feathers.push(new Feather(d.x,d.y));
      hit=true;break;
    }
  }
  if(!hit){
    totalHits.push(false);if(totalHits.length>10)totalHits.shift();
  }
  shotEffects.push({x:aim.x,y:aim.y,t:Date.now(),hit});
  if(bulletsLeft===0){
    const alive=ducks.filter(d=>!d.hit&&!d.dead);
    if(alive.length>0){triggerDog();ducksMissed+=alive.length;}
    setTimeout(()=>{ducks.forEach(d=>{if(!d.hit&&!d.dead)d.dead=true;});},700);
  }
}

// ── Main Loop ─────────────────────────────────────────────────────────────────
let frameCount = 0;
function render(){
  frameCount++;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  updateAim();

  // Animate pixel hand frames every ~20 game frames
  handFlipTimer++;
  if(handFlipTimer > 20){ handFrame = handFrame === 0 ? 1 : 0; handFlipTimer = 0; }

  if(state==='ready'){
    drawReady();
  } else if(state==='playing'){
    drawScene();
    updateDog();drawDog();
    drawGrass();
    for(let i=ducks.length-1;i>=0;i--){
      ducks[i].update();ducks[i].draw();
      if(ducks[i].escaped&&!ducks[i]._ec){
        ducks[i]._ec=true;
        if(!ducks[i].hit){ducksMissed++;totalHits.push(false);if(totalHits.length>10)totalHits.shift();triggerDog();}
      }
    }
    for(let i=feathers.length-1;i>=0;i--){
      feathers[i].update();feathers[i].draw();if(feathers[i].life<=0)feathers.splice(i,1);
    }
    drawEffects();drawHUD();drawStatus();
    drawNoGunWarning();
    // Crosshair always drawn LAST to xhCanvas (top layer)
    drawCrosshair(smoothAim.x,smoothAim.y);
    const allGone=ducks.length>0&&ducks.every(d=>d.dead||(d.y>canvas.height+100));
    if(allGone&&!nextRoundTimer)onRoundEnd();
  } else if(state==='gameover'){
    drawGameOver();
  }
  requestAnimationFrame(render);
}

// ── MediaPipe ─────────────────────────────────────────────────────────────────
function initHandTracking(){
  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.60,minTrackingConfidence:0.55});
  hands.onResults(results=>{
    const now=Date.now();
    if(results.multiHandLandmarks&&results.multiHandLandmarks.length){
      const lm=results.multiHandLandmarks[0];
      rawAim.x=(1-lm[8].x)*canvas.width;
      rawAim.y=lm[8].y*canvas.height;
      isGunPose=detectGunPose(lm);
      if(isGunPose){
        lastSeen=now;
        const fired=checkThumbShoot(lm,now);
        if(fired){
          if(state==='gameover') startGame();
          else shoot(); // shoot() handles both ready and playing states
        }
      } else {
        thumbState='unknown';stableCount=0;openBaseline=null;
      }
    } else {
      isGunPose=false;
      if(now-lastSeen>DROPOUT_GRACE){thumbState='unknown';stableCount=0;openBaseline=null;}
    }
  });
  const camera=new Camera(video,{
    onFrame:async()=>{await hands.send({image:video});},
    width:1280,height:720,
  });
  document.getElementById('load-status').textContent='LOADING HAND TRACKING...';
  camera.start().then(()=>{
    video.classList.add('show');
    document.getElementById('loading').classList.add('hidden');
    state='ready';
  }).catch(err=>{
    console.error(err);
    document.body.style.cursor='auto';
    document.getElementById('loading').innerHTML=`
      <div class="nes-box" style="text-align:center;padding:32px 40px;max-width:520px;margin:24px;">
        <div class="nes-title">DUCK HUNT AR</div>
        <div style="font-size:10px;letter-spacing:2px;color:#98d800;margin-bottom:24px;">POINT YOUR FINGER. SHOOT WITH YOUR THUMB.</div>
        <div style="border-top:2px solid #333;margin-bottom:20px;"></div>
        <div style="font-size:9px;letter-spacing:2px;color:#fc7460;margin-bottom:8px;">&#9888; CAMERA ACCESS BLOCKED</div>
        <div style="font-size:8px;letter-spacing:1px;color:#6a6a6a;line-height:2.2;margin-bottom:24px;">This game requires camera access.<br>Embedded frames block it by default.</div>
        <a href="${window.location.href}" target="_blank"
          style="display:inline-flex;align-items:center;gap:10px;padding:16px 28px;background:#06D6A0;color:#000;font-family:monospace;font-size:11px;font-weight:bold;letter-spacing:3px;text-transform:uppercase;text-decoration:none;box-shadow:0 5px 0 #038a66,5px 5px 0 rgba(0,0,0,0.5);"
          onmouseover="this.style.transform='translateY(3px)';this.style.boxShadow='0 2px 0 #038a66,2px 2px 0 rgba(0,0,0,0.5)'"
          onmouseout="this.style.transform='';this.style.boxShadow='0 5px 0 #038a66,5px 5px 0 rgba(0,0,0,0.5)'"
        >&#127918; OPEN FULL EXPERIENCE &#8594;</a>
        <div style="font-size:8px;letter-spacing:2px;color:#4a7a00;margin-top:12px;">OPENS IN NEW TAB</div>
      </div>
    `;
  });
}

render();
initHandTracking();
</script>
