<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draw the Path</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #edeae4;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'DM Mono', monospace; user-select: none;
  }
  .wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 860px; padding: 24px 40px; }
  .hint { font-size: 10px; letter-spacing: 0.22em; color: #999; text-transform: uppercase; transition: opacity 0.4s; height: 16px; }
  .hint.hidden { opacity: 0; }
  #game-canvas { cursor: crosshair; display: block; width: 100%; height: auto; border: 1.5px solid #1a1a1a; box-shadow: 4px 4px 0px #1a1a1a; }
  .footer { font-size: 9px; letter-spacing: 0.22em; color: #bbb; text-transform: uppercase; }
  #reset-btn {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    background: #fff; color: #1a1a1a; border: 1.5px solid #1a1a1a; padding: 8px 28px;
    cursor: pointer; box-shadow: 3px 3px 0px #1a1a1a; transition: box-shadow 0.1s, transform 0.1s;
  }
  #reset-btn:hover { box-shadow: 1px 1px 0px #1a1a1a; transform: translate(2px,2px); }
  #reset-btn:active { box-shadow: none; transform: translate(3px,3px); }
</style>
</head>
<body>
<div class="wrap">
  <div class="hint" id="hint">draw a path &nbsp;·&nbsp; release to drop</div>
  <canvas id="game-canvas"></canvas>
  <button id="reset-btn" onclick="resetGame()">reset</button>
  <div class="footer">draw &nbsp;·&nbsp; release &nbsp;·&nbsp; watch</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const { Engine, Bodies, World, Events } = Matter;

const W = Math.min(window.innerWidth - 80, 780);
const H = Math.round(W * 0.65);

const canvas = document.getElementById('game-canvas');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

const engine = Engine.create({ gravity: { y: 1.2 } });
const world = engine.world;

const BALL_R = 18;
const BALL_START = { x: 68, y: 68 };

const BX = W - 115;
const BY = H - 125;
const BW_TOP = 72;
const BW_BOT = 52;
const BD = 52;
const RIM_RY = 10;
const RIM_INNER_RY = 6;

let state = 'idle';
let drawnPoints = [];
let drawnBodies = [];
let ball = null;
let scored = false;
let missTimer = 0;

World.add(world, [
  Bodies.rectangle(W/2, H+30, W*2, 60, { isStatic: true }),
  Bodies.rectangle(-30, H/2, 60, H*2, { isStatic: true }),
  Bodies.rectangle(W+30, H/2, 60, H*2, { isStatic: true }),
]);

const bLX = BX - BW_TOP/2, bRX = BX + BW_TOP/2;
const bBY = BY + BD;
const leftWall  = Bodies.rectangle(bLX, BY + BD/2, 5, BD, { isStatic: true, friction: 0.1 });
const rightWall = Bodies.rectangle(bRX, BY + BD/2, 5, BD, { isStatic: true, friction: 0.1 });
const sensor    = Bodies.rectangle(BX, bBY - 6, BW_BOT - 10, 8, { isStatic: true, isSensor: true, label: 'basket_sensor' });
World.add(world, [leftWall, rightWall, sensor]);

Events.on(engine, 'collisionStart', (e) => {
  for (const pair of e.pairs) {
    const labels = [pair.bodyA.label, pair.bodyB.label];
    if (labels.includes('ball') && labels.includes('basket_sensor')) scored = true;
  }
});

function spawnBall() {
  const b = Bodies.circle(BALL_START.x, BALL_START.y, BALL_R, {
    restitution: 0.45, friction: 0.05, frictionAir: 0.006, density: 0.003, label: 'ball'
  });
  World.add(world, b);
  return b;
}

function buildLineBodies(points) {
  const bodies = [];
  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i], b = points[i+1];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 2) continue;
    const seg = Bodies.rectangle((a.x+b.x)/2, (a.y+b.y)/2, len, 5, {
      isStatic: true, angle: Math.atan2(dy, dx), friction: 0.05, restitution: 0.3
    });
    bodies.push(seg);
  }
  World.add(world, bodies);
  return bodies;
}

function resetGame() {
  if (ball) World.remove(world, ball);
  drawnBodies.forEach(b => World.remove(world, b));
  ball = null; drawnBodies = []; drawnPoints = [];
  scored = false; missTimer = 0; state = 'idle';
  hint.classList.remove('hidden');
}

function drawGrid() {
  const step = W / 26;
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 0.7;
  for (let x = 0; x <= W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();
}

function drawBall() {
  const pos = ball ? ball.position : BALL_START;
  const angle = ball ? ball.angle : 0;
  ctx.save();
  ctx.translate(pos.x, pos.y);
  ctx.rotate(angle);
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.8;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, -0.4, Math.PI + 0.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -BALL_R); ctx.lineTo(0, BALL_R); ctx.stroke();
  ctx.restore();
}

// Step 1: Draw the basket body + walls + bottom ellipse + inner grid
// Also draw the TOP arc of the rim ellipse (far/back side) — behind ball
function drawBasketBodyAndRimBack() {
  const lxT = BX - BW_TOP/2, rxT = BX + BW_TOP/2;
  const lxB = BX - BW_BOT/2, rxB = BX + BW_BOT/2;
  const tyB = BY, byB = BY + BD;

  ctx.save();

  // Ground shadow under basket
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(BX, BY + BD + 10, BW_BOT/2 + 10, 6, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.fill();
  ctx.restore();

  // Inner dashed grid clipped to basket trapezoid
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lxT, tyB); ctx.lineTo(rxT, tyB);
  ctx.lineTo(rxB, byB); ctx.lineTo(lxB, byB);
  ctx.closePath();
  ctx.clip();
  ctx.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 0.8;
  ctx.setLineDash([3, 3]);
  const gs = 10;
  for (let x = lxT - 5; x <= rxT + 5; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, tyB - 2); ctx.lineTo(x + 3, byB + 2); ctx.stroke();
  }
  for (let y = tyB; y <= byB + gs; y += gs) {
    const frac = (y - tyB) / BD;
    const hw = BW_BOT/2 + (BW_TOP/2 - BW_BOT/2) * (1 - frac);
    ctx.beginPath(); ctx.moveTo(BX - hw, y); ctx.lineTo(BX + hw, y); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();

  // Side walls (no top edge — rim handles that)
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(lxT, tyB);
  ctx.lineTo(lxB, byB);
  ctx.lineTo(rxB, byB);
  ctx.lineTo(rxT, tyB);
  ctx.stroke();

  // Bottom ellipse
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(BX, byB, BW_BOT/2, 3.5, 0, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#1a1a1a';
  ctx.stroke();

  // Rim: full ellipse fill (white) to establish the ring shape - back portion drawn here
  // Draw the full rim ellipse filled, then stroke — back half first (behind ball)
  ctx.lineWidth = 2.8;
  ctx.strokeStyle = '#1a1a1a';

  // Full outer rim ellipse — fill white so it masks basket walls cleanly
  ctx.beginPath();
  ctx.ellipse(BX, tyB, BW_TOP/2, RIM_RY, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.stroke();

  // Inner hole — fill white (canvas background) so it's clean
  ctx.beginPath();
  ctx.ellipse(BX, tyB, BW_TOP/2 - 5, RIM_INNER_RY - 1, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  ctx.restore();
}

// Step 2 (after ball): Draw BOTTOM arc of rim ellipse (near/front side) — in front of ball
function drawRimFront() {
  const tyB = BY;
  ctx.save();
  ctx.lineWidth = 2.8;
  ctx.strokeStyle = '#1a1a1a';

  // Front (near) half of outer rim ellipse - just the bottom arc, stroked over the ball
  ctx.beginPath();
  ctx.ellipse(BX, tyB, BW_TOP/2, RIM_RY, 0, 0, Math.PI);
  ctx.stroke();

  ctx.restore();
}

function drawHintArc() {
  if (state !== 'idle') return;
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 6]);
  ctx.beginPath();
  ctx.moveTo(BALL_START.x, BALL_START.y + BALL_R);
  ctx.bezierCurveTo(
    BALL_START.x + (BX - BALL_START.x) * 0.3, BALL_START.y + H * 0.5,
    BALL_START.x + (BX - BALL_START.x) * 0.7, BY - H * 0.1,
    BX, BY
  );
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.save();
  ctx.translate(BX - 10, BY + 6); ctx.rotate(0.9);
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-5,-4); ctx.lineTo(0,0); ctx.lineTo(-5,4); ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.translate(BALL_START.x + 18, BALL_START.y + 28); ctx.rotate(2.4);
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-5,-4); ctx.lineTo(0,0); ctx.lineTo(-5,4); ctx.stroke();
  ctx.restore();
  ctx.restore();
}

function drawLabels() {
  if (state !== 'idle') return;
  ctx.save();
  ctx.font = '9px DM Mono';
  ctx.fillStyle = '#aaa';
  ctx.fillText('BALL', BALL_START.x + 26, BALL_START.y - 26);
  ctx.fillText('BASKET', BX + BW_TOP/2 + 8, BY - 8);
  ctx.restore();
}

function drawDrawnLines() {
  if (drawnPoints.length > 1) {
    ctx.save();
    ctx.strokeStyle = '#de7356'; ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(drawnPoints[0].x, drawnPoints[0].y);
    for (let i = 1; i < drawnPoints.length; i++) ctx.lineTo(drawnPoints[i].x, drawnPoints[i].y);
    ctx.stroke(); ctx.restore();
  }
}

function drawOverlay() {
  if (scored) {
    ctx.save(); ctx.font = '700 26px DM Serif Display'; ctx.fillStyle = '#1a1a1a'; ctx.textAlign = 'center';
    ctx.fillText('nice shot.', W/2, H/2); ctx.restore();
  } else if (state === 'missed') {
    ctx.save(); ctx.font = '700 24px DM Serif Display'; ctx.fillStyle = '#1a1a1a'; ctx.textAlign = 'center';
    ctx.fillText('missed.', W/2, H/2); ctx.restore();
  }
}

let lastTime = 0;
function loop(ts) {
  const dt = Math.min(ts - lastTime, 33); lastTime = ts;
  if (state === 'running') {
    Matter.Engine.update(engine, dt);
    if (ball && !scored) {
      const pos = ball.position, vel = ball.velocity;
      const speed = Math.sqrt(vel.x*vel.x + vel.y*vel.y);
      if (pos.y > H + 40) state = 'missed';
      else if (speed < 0.3 && pos.y > H - 80) { missTimer++; if (missTimer > 60) state = 'missed'; }
    }
    if (scored && state !== 'scored') state = 'scored';
  }

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  drawGrid();
  drawHintArc();

  // Paint order: basket → drawn lines → ball → rim front
  // Drawn lines always on top of basket; rim front arc sits over ball only
  drawBasketBodyAndRimBack();
  drawDrawnLines();
  drawBall();
  drawRimFront();

  drawLabels();
  drawOverlay();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
}
canvas.addEventListener('mousedown', (e) => {
  if (state === 'scored' || state === 'missed' || state === 'running') return;
  hint.classList.add('hidden');
  drawnPoints = [];
  if (ball) { World.remove(world, ball); ball = null; }
  drawnBodies.forEach(b => World.remove(world, b)); drawnBodies = [];
  scored = false; missTimer = 0; state = 'drawing';
  drawnPoints.push(getPos(e));
});
canvas.addEventListener('mousemove', (e) => {
  if (state !== 'drawing') return;
  const pos = getPos(e), last = drawnPoints[drawnPoints.length-1];
  if (!last || Math.hypot(pos.x-last.x, pos.y-last.y) > 6) drawnPoints.push(pos);
});
canvas.addEventListener('mouseup', () => {
  if (state !== 'drawing') return;
  if (drawnPoints.length < 2) { state = 'idle'; return; }
  drawnBodies = buildLineBodies(drawnPoints);
  ball = spawnBall(); state = 'running';
});
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const t=e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY})); }, {passive:false});
canvas.addEventListener('touchmove',  (e) => { e.preventDefault(); const t=e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove', {clientX:t.clientX,clientY:t.clientY})); }, {passive:false});
canvas.addEventListener('touchend',   (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup',{})); }, {passive:false});

resetGame();
</script>
</body>
</html>
