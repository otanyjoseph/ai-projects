<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draw the Path</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f2ee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 1000px;
    max-width: 860px;
    margin: 0 auto;
    font-family: 'DM Mono', monospace;
    user-select: none;
    overflow: hidden;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 24px 40px;
  }

  .hint {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #aaa;
    text-transform: uppercase;
    transition: opacity 0.4s;
    height: 16px;
  }
  .hint.hidden { opacity: 0; }

  #game-canvas {
    background: #fff;
    border: 1.5px solid #1a1a1a;
    cursor: crosshair;
    display: block;
    box-shadow: 4px 4px 0px #1a1a1a;
    width: 100%;
    height: auto;
  }

  .footer {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #ccc;
    text-transform: uppercase;
  }

  #reset-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: #fff;
    color: #1a1a1a;
    border: 1.5px solid #1a1a1a;
    padding: 8px 28px;
    cursor: pointer;
    box-shadow: 3px 3px 0px #1a1a1a;
    transition: box-shadow 0.1s, transform 0.1s;
  }
  #reset-btn:hover {
    box-shadow: 1px 1px 0px #1a1a1a;
    transform: translate(2px, 2px);
  }
  #reset-btn:active {
    box-shadow: none;
    transform: translate(3px, 3px);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hint" id="hint">draw a path · release to drop</div>
  <canvas id="game-canvas"></canvas>
  <button id="reset-btn" onclick="reset()">reset</button>
  <div class="footer">draw · release · watch</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
const { Engine, Render, Runner, Bodies, Body, World, Events, Vector, Composite } = Matter;

const W = Math.min(window.innerWidth - 80, 780);
const H = Math.round(W * 0.65);

const canvas = document.getElementById('game-canvas');
canvas.width = W;
canvas.height = H;

const hint = document.getElementById('hint');

const engine = Engine.create({ gravity: { y: 1.2 } });
const world = engine.world;

const BALL_R = 16;
const BALL_START = { x: 60, y: 55 };

const BASKET_X = W - 100;
const BASKET_Y = H - 100;
const BASKET_W = 60;
const BASKET_DEPTH = 34;

let state = 'idle';
let drawnPoints = [];
let drawnBodies = [];
let ball = null;
let scored = false;
let missTimer = 0;

const floor = Bodies.rectangle(W/2, H + 30, W * 2, 60, { isStatic: true, label: 'floor' });
const wallL = Bodies.rectangle(-30, H/2, 60, H*2, { isStatic: true });
const wallR = Bodies.rectangle(W+30, H/2, 60, H*2, { isStatic: true });
World.add(world, [floor, wallL, wallR]);

function makeBasket() {
  const thick = 5;
  const lx = BASKET_X - BASKET_W/2;
  const rx = BASKET_X + BASKET_W/2;
  const by = BASKET_Y + BASKET_DEPTH;
  const leftWall  = Bodies.rectangle(lx, BASKET_Y + BASKET_DEPTH/2, thick, BASKET_DEPTH, { isStatic: true, label: 'basket_wall', friction: 0.1 });
  const rightWall = Bodies.rectangle(rx, BASKET_Y + BASKET_DEPTH/2, thick, BASKET_DEPTH, { isStatic: true, label: 'basket_wall', friction: 0.1 });
  const sensor    = Bodies.rectangle(BASKET_X, by - 6, BASKET_W - 12, 8, { isStatic: true, isSensor: true, label: 'basket_sensor' });
  World.add(world, [leftWall, rightWall, sensor]);
  return { leftWall, rightWall, sensor };
}
const basket = makeBasket();

Events.on(engine, 'collisionStart', (e) => {
  for (const pair of e.pairs) {
    const labels = [pair.bodyA.label, pair.bodyB.label];
    if (labels.includes('ball') && labels.includes('basket_sensor')) {
      scored = true;
    }
  }
});

function spawnBall() {
  const b = Bodies.circle(BALL_START.x, BALL_START.y, BALL_R, {
    restitution: 0.5, friction: 0.05, frictionAir: 0.005, density: 0.003, label: 'ball'
  });
  World.add(world, b);
  return b;
}

function buildLineBodies(points) {
  const bodies = [];
  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i], b = points[i+1];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 2) continue;
    const seg = Bodies.rectangle((a.x+b.x)/2, (a.y+b.y)/2, len, 5, {
      isStatic: true, angle: Math.atan2(dy, dx), friction: 0.05, restitution: 0.3, label: 'line'
    });
    bodies.push(seg);
  }
  World.add(world, bodies);
  return bodies;
}

function reset() {
  if (ball) World.remove(world, ball);
  drawnBodies.forEach(b => World.remove(world, b));
  ball = null; drawnBodies = []; drawnPoints = [];
  scored = false; missTimer = 0; state = 'idle';
  hint.classList.remove('hidden');
}

const ctx = canvas.getContext('2d');

function drawBall() {
  const pos = ball ? ball.position : BALL_START;
  const angle = ball ? ball.angle : 0;
  ctx.save();
  ctx.translate(pos.x, pos.y);
  ctx.rotate(angle);
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, -0.4, Math.PI + 0.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -BALL_R); ctx.lineTo(0, BALL_R); ctx.stroke();
  ctx.restore();
}

function drawBasket() {
  ctx.save();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  const lx = BASKET_X - BASKET_W/2;
  const rx = BASKET_X + BASKET_W/2;
  const ty = BASKET_Y;
  const by = BASKET_Y + BASKET_DEPTH;
  ctx.beginPath(); ctx.ellipse(BASKET_X, ty, BASKET_W/2, 7, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx, ty); ctx.lineTo(lx, by); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx, ty); ctx.lineTo(rx, by); ctx.stroke();
  ctx.lineWidth = 1; ctx.strokeStyle = '#555';
  const netSegs = 5;
  for (let i = 0; i <= netSegs; i++) {
    const nx = lx + (BASKET_W / netSegs) * i;
    ctx.beginPath(); ctx.moveTo(nx, ty + 6);
    ctx.quadraticCurveTo(nx + (BASKET_X - nx) * 0.3, by - 4, lx + (rx - lx) * 0.3 + i * (BASKET_W * 0.4 / netSegs), by);
    ctx.stroke();
  }
  for (let row = 1; row <= 3; row++) {
    const ny = ty + 6 + (BASKET_DEPTH - 6) * (row / 4);
    const spread = (row / 4) * 0.15;
    ctx.beginPath(); ctx.moveTo(lx + BASKET_W * spread, ny); ctx.lineTo(rx - BASKET_W * spread, ny); ctx.stroke();
  }
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(rx + 8, ty - 10); ctx.lineTo(rx + 8, by + 20); ctx.stroke();
  ctx.strokeRect(rx + 2, ty - 28, 22, 32);
  ctx.restore();
}

function drawDrawnLines() {
  if (drawnPoints.length > 1) {
    ctx.save();
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(drawnPoints[0].x, drawnPoints[0].y);
    for (let i = 1; i < drawnPoints.length; i++) ctx.lineTo(drawnPoints[i].x, drawnPoints[i].y);
    ctx.stroke(); ctx.restore();
  }
}

function drawLabels() {
  ctx.save(); ctx.font = '10px DM Mono'; ctx.fillStyle = '#bbb';
  ctx.fillText('ball', BALL_START.x + BALL_R + 6, BALL_START.y - BALL_R - 4);
  ctx.fillText('basket', BASKET_X + BASKET_W/2 + 14, BASKET_Y + 6);
  ctx.restore();
}

function drawScoreOverlay() {
  if (scored) {
    ctx.save(); ctx.font = '700 28px DM Serif Display'; ctx.fillStyle = '#1a1a1a'; ctx.textAlign = 'center';
    ctx.fillText('nice shot.', W/2, H/2); ctx.restore();
  } else if (state === 'missed') {
    ctx.save(); ctx.font = '700 26px DM Serif Display'; ctx.fillStyle = '#1a1a1a'; ctx.textAlign = 'center';
    ctx.fillText('missed.', W/2, H/2); ctx.restore();
  }
}

let lastTime = 0;
function loop(ts) {
  const dt = Math.min(ts - lastTime, 33); lastTime = ts;
  if (state === 'running') {
    Engine.update(engine, dt);
    if (ball && !scored) {
      const pos = ball.position, vel = ball.velocity;
      const speed = Math.sqrt(vel.x*vel.x + vel.y*vel.y);
      if (pos.y > H + 40) state = 'missed';
      else if (speed < 0.3 && pos.y > H - 80) { missTimer++; if (missTimer > 60) state = 'missed'; }
    }
    if (scored && state !== 'scored') state = 'scored';
  }
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
  drawDrawnLines(); drawBasket(); drawBall(); drawLabels(); drawScoreOverlay();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
}

canvas.addEventListener('mousedown', (e) => {
  if (state === 'scored' || state === 'missed' || state === 'running') return;
  hint.classList.add('hidden');
  drawnPoints = [];
  if (ball) { World.remove(world, ball); ball = null; }
  drawnBodies.forEach(b => World.remove(world, b)); drawnBodies = [];
  scored = false; missTimer = 0; state = 'drawing';
  drawnPoints.push(getPos(e));
});

canvas.addEventListener('mousemove', (e) => {
  if (state !== 'drawing') return;
  const pos = getPos(e), last = drawnPoints[drawnPoints.length - 1];
  if (!last || Math.hypot(pos.x - last.x, pos.y - last.y) > 6) drawnPoints.push(pos);
});

canvas.addEventListener('mouseup', () => {
  if (state !== 'drawing') return;
  if (drawnPoints.length < 2) { state = 'idle'; return; }
  drawnBodies = buildLineBodies(drawnPoints);
  ball = spawnBall(); state = 'running';
});

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
canvas.addEventListener('touchmove',  (e) => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove',  { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
canvas.addEventListener('touchend',   (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup', {})); }, { passive: false });

reset();
</script>
</body>
</html>
